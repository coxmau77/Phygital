<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phygital Experience</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link rel="stylesheet" href="styles.css">

  <meta property="og:title" content="Phygital Experience">
  <meta property="og:description" content="Tu recuerdo Phygital, en alta definición">

  <meta property="og:image:height" content="630">

</head>
<body>

  <main id="app-container">
    <figure class="canvas-container">
      <img id="phygital-pic" src="https://pub-aed658d5b76840bcb6f152b24c3994e4.r2.dev/y_un_dia_crecimos.jpeg" alt="Tu recuerdo Phygital" loading="eager">

        <path fill-rule="evenodd" d="M8 3a5 5 0 1 1-4.546 2.914.5.5 0 0 1 .908-.417A4 4 0 1 0 8 4z"/>

      </svg>
    </button>

    <button id="open-menu-btn" aria-label="Compartir y opciones" class="floating-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
        <path d="M13.5 1a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3M11 2.5a2.5 2.5 0 1 1 .603 1.628l-6.718 3.12a2.5 2.5 0 0 1 0 1.504l6.718 3.12a2.5 2.5 0 1 1-.488.876l-6.718-3.12a2.5 2.5 0 1 1 0-3.256l6.718-3.12A2.5 2.5 0 0 1 11 2.5m-8.5 4a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3m11 5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3"/>
      </svg>
    </button>
  </main>

    <div class="dialog-header">
      <h2>Compartir</h2>
      <button id="close-dialog-btn" aria-label="Cerrar menú">✕</button>
    </div>

    <div class="social-grid">

        </svg>
      </button>

      <button class="social-btn" aria-label="Compartir por Telegram">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8.287 5.906q-1.168.486-4.666 2.01c-.56.223-.845.443-.854.661-.015.367.447.511.447.511l1.196.372 2.8-1.746c.15-.1.314-.047.204.06L4.711 9.804l-.199 1.942c.032.227.142.343.243.435l.939-.91 1.965 1.452c.361.2.622.1.714-.23a23 23 0 0 0 1.635-7.712c-.007-.403-.223-.55-.54-.525q-.185.016-.79.26"/>
        </svg>
      </button>

      <button class="social-btn" aria-label="Compartir por Email">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741zM1 11.105l4.708-2.897L1 5.383z"/>
        </svg>
      </button>
    </div>

    <hr class="divider">

    <div class="theme-control">
      <span id="theme-label">Modo Oscuro</span>
      <label class="switch" for="dark-mode-toggle">
        <input type="checkbox" id="dark-mode-toggle" aria-labelledby="theme-label">
        <span class="slider round"></span>
      </label>
    </div>

    <a href="https://tudominio.com/landing-info" class="promo-btn" target="_blank" rel="noopener">
      Quiero mi Phygital
    </a>
  </dialog>

</body>
</html>
